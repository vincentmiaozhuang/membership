server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/membership_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: api
    password: api123!!!
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

logging:
  file:
    name: /Users/vincentmiao/Documents/trae_projects/members/membership-system/log/external-backend.log
  level:
    root: INFO
    com.membership: DEBUG

# API配置
api:
  rate-limit:
    requests-per-minute: 100
    burst-limit: 200

