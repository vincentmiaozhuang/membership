spring:
  application:
    name: membership-backend
  
  datasource:
    url: jdbc:mysql://localhost:3306/membership_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: members
    password: members
  
  h2:
    console:
      enabled: false
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: mySecretKey123456789012345678901234567890
  expiration: 86400000

cors:
  allowed-origins: http://localhost:5175,http://localhost:5176

logging:
  file:
    name: /Users/vincentmiao/Documents/trae_projects/members/membership-system/log/backend.log
