spring:
  application:
    name: membership-backend
  
  datasource:
    url: jdbc:h2:mem:membership_db
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: mySecretKey123456789012345678901234567890
  expiration: 86400000

cors:
  allowed-origins: http://localhost:5173
